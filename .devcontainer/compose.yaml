services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../:/home/vscode/app:cached
      - astro:/home/vscode/.astro
      - dist:/home/vscode/dist
      - node_modules:/home/vscode/app/node_modules
    environment:
      NODE_OPTIONS: --no-deprecation
      NODE_ENV: development
    tty: true
    stdin_open: true

volumes:
  astro:
    driver: local
  dist:
    driver: local
  node_modules:
    driver: local
